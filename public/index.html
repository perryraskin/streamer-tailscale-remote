<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#11131a" />
  <title>RokuPi Remote</title>
  <style>
    :root {
      --bg: #11131a;
      --panel: #1c1f2b;
      --btn: #2a2f3f;
      --btn-active: #3b4252;
      --accent: #6c5ce7;
      --text: #f2f3f7;
      --muted: #8b90a0;
      --ok: #2ecc71;
      --bad: #e74c3c;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
      gap: 16px;
      max-width: 460px;
      margin: 0 auto;
      user-select: none;
    }
    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    h1 { font-size: 18px; margin: 0; letter-spacing: 0.5px; }
    #status {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
    #dot.ok { background: var(--ok); }
    #dot.bad { background: var(--bad); }

    button {
      font: inherit;
      color: var(--text);
      background: var(--btn);
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 16px;
      cursor: pointer;
      transition: transform .05s ease, background .15s ease;
    }
    button:active { background: var(--accent); transform: scale(0.96); }

    .panel {
      width: 100%;
      background: var(--panel);
      border-radius: 20px;
      padding: 16px;
    }

    /* D-pad */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      aspect-ratio: 1 / 1;
    }
    .dpad button { font-size: 22px; height: 100%; }
    .ok-btn { background: var(--accent); font-weight: 600; }
    .span-empty { visibility: hidden; }

    .row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .row.two { grid-template-columns: repeat(2, 1fr); }

    .label { font-size: 12px; color: var(--muted); margin: 0 0 8px 2px; text-transform: uppercase; letter-spacing: 1px; }

    .apps { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .apps button { font-weight: 600; }

    #toast {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #000a;
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      backdrop-filter: blur(6px);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header>
    <h1>RokuPi</h1>
    <div id="status"><span id="dot"></span><span id="status-text">checking…</span></div>
  </header>

  <div class="panel">
    <div class="dpad">
      <button class="span-empty"></button>
      <button data-key="Up">▲</button>
      <button class="span-empty"></button>

      <button data-key="Left">◀</button>
      <button class="ok-btn" data-key="Select">OK</button>
      <button data-key="Right">▶</button>

      <button class="span-empty"></button>
      <button data-key="Down">▼</button>
      <button class="span-empty"></button>
    </div>

    <div class="row">
      <button data-key="Back">↩ Back</button>
      <button data-key="Home">⌂ Home</button>
      <button data-task="reset-home">⟳ Reset</button>
    </div>
  </div>

  <div class="panel">
    <p class="label">Playback</p>
    <div class="row">
      <button data-key="Rev">⏪</button>
      <button data-key="Play">⏯</button>
      <button data-key="Fwd">⏩</button>
    </div>
    <div class="row">
      <button data-key="InstantReplay">⏮ Replay</button>
      <button data-key="Info">ⓘ Info</button>
      <button data-key="VolumeMute">🔇 Mute</button>
    </div>
  </div>

  <div class="panel">
    <p class="label">Apps</p>
    <div class="apps">
      <button data-app="netflix">Netflix</button>
      <button data-app="youtube">YouTube</button>
      <button data-app="plex">Plex</button>
      <button data-app="youtube_tv">YouTube TV</button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const toastEl = document.getElementById('toast');
    let toastTimer;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
    }

    async function post(pathSuffix, okMsg) {
      try {
        const res = await fetch(pathSuffix, { method: 'POST' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        if (okMsg) toast(okMsg);
      } catch (err) {
        toast('Failed: ' + err.message);
      }
    }

    // Event delegation for every button with a data-* action.
    document.body.addEventListener('click', (e) => {
      const b = e.target.closest('button');
      if (!b) return;
      if (b.dataset.key) post('/remote/' + b.dataset.key);
      else if (b.dataset.task) post('/task/' + b.dataset.task, 'Reset sent');
      else if (b.dataset.app) post('/task/open/' + b.dataset.app, 'Opening ' + b.textContent);
    });

    // Health indicator
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    async function checkHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        if (data.ok) {
          dot.className = 'ok';
          statusText.textContent = 'connected · ' + (data.roku_ip || 'roku');
        } else {
          dot.className = 'bad';
          statusText.textContent = 'no roku';
        }
      } catch {
        dot.className = 'bad';
        statusText.textContent = 'offline';
      }
    }
    checkHealth();
    setInterval(checkHealth, 15000);
  </script>
</body>
</html>
