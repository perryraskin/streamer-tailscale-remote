<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f1320" />
  <title>FamilyTV Remote</title>
  <style>
    :root {
      --bg: #0f1320;
      --panel: #1a1f30;
      --btn: #28304a;
      --accent: #4f8cff;
      --text: #f2f4fa;
      --muted: #8b93ab;
      --ok: #2ecc71;
      --bad: #e74c3c;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
      gap: 16px; max-width: 460px; margin: 0 auto; user-select: none;
    }
    header { width: 100%; display: flex; align-items: center; justify-content: space-between; }
    h1 { font-size: 18px; margin: 0; letter-spacing: .5px; }
    #status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    #dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
    #dot.ok { background: var(--ok); } #dot.bad { background: var(--bad); }
    button { font: inherit; color: var(--text); background: var(--btn); border: none; border-radius: 14px; padding: 18px; font-size: 16px; cursor: pointer; transition: transform .05s, background .15s; }
    button:active { background: var(--accent); transform: scale(.96); }
    .panel { width: 100%; background: var(--panel); border-radius: 20px; padding: 16px; }
    .label { font-size: 12px; color: var(--muted); margin: 0 0 8px 2px; text-transform: uppercase; letter-spacing: 1px; }
    .dpad { display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); gap: 10px; aspect-ratio: 1/1; }
    .dpad button { font-size: 22px; height: 100%; }
    .ok-btn { background: var(--accent); font-weight: 600; }
    .span-empty { visibility: hidden; }
    .row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 12px; }
    .apps { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
    .apps button { font-weight: 600; text-transform: capitalize; }
    #shot { width: 100%; border-radius: 12px; display: block; background: #000; aspect-ratio: 16/9; object-fit: contain; }
    .shotbar { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
    .shotbar button { flex: 1; padding: 12px; }
    .toggle { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .typebar { display: flex; gap: 10px; }
    .typebar input { flex: 1; font: inherit; padding: 14px; border-radius: 12px; border: none; background: #0c0f1a; color: var(--text); }
    .typebar button { padding: 14px 18px; }
    #toast { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: #000a; color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; backdrop-filter: blur(6px); }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header>
    <h1>FamilyTV</h1>
    <div id="status"><span id="dot"></span><span id="status-text">checking…</span></div>
  </header>

  <div class="panel">
    <p class="label">Screen <span id="appname" style="text-transform:none"></span></p>
    <img id="shot" alt="TV screenshot — tap refresh" />
    <div class="shotbar">
      <button id="refresh">⟳ Refresh</button>
      <label class="toggle"><input type="checkbox" id="auto" /> auto</label>
    </div>
  </div>

  <div class="panel">
    <div class="dpad">
      <button class="span-empty"></button>
      <button data-key="up">▲</button>
      <button class="span-empty"></button>
      <button data-key="left">◀</button>
      <button class="ok-btn" data-key="select">OK</button>
      <button data-key="right">▶</button>
      <button class="span-empty"></button>
      <button data-key="down">▼</button>
      <button class="span-empty"></button>
    </div>
    <div class="row">
      <button data-key="back">↩ Back</button>
      <button data-key="home">⌂ Home</button>
      <button data-task="reset-home">⟳ Reset</button>
    </div>
  </div>

  <div class="panel">
    <p class="label">Playback</p>
    <div class="row">
      <button data-key="rewind">⏪</button>
      <button data-key="play_pause">⏯</button>
      <button data-key="fast_forward">⏩</button>
    </div>
    <div class="row">
      <button data-key="volume_down">🔉 Vol−</button>
      <button data-key="mute">🔇 Mute</button>
      <button data-key="volume_up">🔊 Vol+</button>
    </div>
  </div>

  <div class="panel">
    <p class="label">Type</p>
    <div class="typebar">
      <input id="textin" type="text" placeholder="Type into the TV…" autocapitalize="off" autocomplete="off" />
      <button id="send">Send</button>
    </div>
  </div>

  <div class="panel">
    <p class="label">Apps</p>
    <div class="apps" id="apps"></div>
  </div>

  <div id="toast"></div>

  <script>
    const toastEl = document.getElementById('toast');
    let toastTimer;
    function toast(msg) {
      toastEl.textContent = msg; toastEl.classList.add('show');
      clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
    }
    async function post(p, okMsg) {
      try {
        const res = await fetch(p, { method: 'POST' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        if (okMsg) toast(okMsg);
      } catch (e) { toast('Failed: ' + e.message); }
    }

    // Buttons (keys / tasks) via delegation
    document.body.addEventListener('click', (e) => {
      const b = e.target.closest('button');
      if (!b) return;
      if (b.dataset.key) post('/remote/' + b.dataset.key);
      else if (b.dataset.task) { post('/task/' + b.dataset.task, 'Reset sent'); setTimeout(refreshShot, 600); }
      else if (b.dataset.app) { post('/launch/' + b.dataset.app, 'Opening ' + b.textContent); setTimeout(refreshShot, 1500); }
    });

    // Text input
    async function sendText() {
      const input = document.getElementById('textin');
      const text = input.value;
      if (!text) return;
      try {
        const res = await fetch('/type', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        toast('Typed'); input.value = '';
      } catch (e) { toast('Failed: ' + e.message); }
    }
    document.getElementById('send').addEventListener('click', sendText);
    document.getElementById('textin').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(); });

    // Screenshot
    const shot = document.getElementById('shot');
    function refreshShot() { shot.src = '/screenshot?t=' + Date.now(); }
    document.getElementById('refresh').addEventListener('click', refreshShot);
    let autoTimer = null;
    document.getElementById('auto').addEventListener('change', (e) => {
      if (e.target.checked) { refreshShot(); autoTimer = setInterval(refreshShot, 3000); }
      else { clearInterval(autoTimer); autoTimer = null; }
    });

    // Health + current app
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const appname = document.getElementById('appname');
    async function checkHealth() {
      try {
        const h = await (await fetch('/health')).json();
        if (h.ok) { dot.className = 'ok'; statusText.textContent = 'connected · ' + (h.model || 'google-tv'); }
        else { dot.className = 'bad'; statusText.textContent = 'no device'; }
      } catch { dot.className = 'bad'; statusText.textContent = 'offline'; }
      try {
        const c = await (await fetch('/current-app')).json();
        appname.textContent = c.app ? '· ' + c.app : (c.package ? '· ' + c.package : '');
      } catch { /* ignore */ }
    }

    // Build app buttons from /config
    (async () => {
      try {
        const cfg = await (await fetch('/config')).json();
        const wrap = document.getElementById('apps');
        (cfg.apps || []).forEach((a) => {
          const b = document.createElement('button');
          b.dataset.app = a;
          b.textContent = a.replace(/_/g, ' ');
          wrap.appendChild(b);
        });
      } catch { /* no apps */ }
    })();

    checkHealth();
    setInterval(checkHealth, 15000);
    refreshShot();
  </script>
</body>
</html>
