# Make systemd's journal persistent across reboots, with a size cap so it
# can't fill the SD card. This is the simplest way to keep RokuPi's logs
# (which go to stdout -> journald) without any flat file or logrotate.
#
# Install to /etc/systemd/journald.conf.d/rokupi.conf, then:
#   sudo mkdir -p /var/log/journal
#   sudo systemctl restart systemd-journald
#
# Afterwards, history survives reboots and journald auto-rotates by size.
# Read logs with:  journalctl -u rokupi
[Journal]
Storage=persistent
SystemMaxUse=200M
