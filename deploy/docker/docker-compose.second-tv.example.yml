services:
  familytv-second:
    build:
      context: ${FAMILYTV_CONTEXT:-../../google}
      dockerfile: Dockerfile
    container_name: ${FAMILYTV_SECOND_CONTAINER_NAME:-familytv-second}
    restart: unless-stopped
    network_mode: host
    env_file:
      - ${FAMILYTV_SECOND_ENV_FILE:-./familytv-second.env}
    environment:
      PORT: ${FAMILYTV_SECOND_PORT:-3001}
      LISTEN_HOST: ${FAMILYTV_LISTEN_HOST:-0.0.0.0}
    volumes:
      - ${FAMILYTV_ADB_HOME:?set FAMILYTV_ADB_HOME}:/root/.android
